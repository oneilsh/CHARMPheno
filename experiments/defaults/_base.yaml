# Cross-cohort defaults for experiment-tracking system.
# Layered as: _base.yaml -> <cohort>.yaml -> per-experiment frontmatter overrides.
# The cluster writes the effective (merged) config into summary.md at fit time
# so changes here do not retroactively affect already-run experiments.
model_class: lda
source_table: condition_era
doc_unit: patient_year
doc_min_length: 20
K: 40
max_iter: 20
vocab_size: 10000
min_df: 20
min_patient_count: 20
subsampling_rate: 0.2
tau0: 64
kappa: 0.7
save_interval: 5
print_topics_every: 1
person_mod: 10
top_n_tokens: 6
seed: 42
optimize_doc_concentration: true
optimize_topic_concentration: false
# Dashboard-build defaults (used by --build-only / make build-dashboard-exp).
# Match build_dashboard_cloud.py's argparse defaults; override per-experiment
# in frontmatter to dial bundle size or NPMI sample size.
vocab_top_n: 5000
top_n_codes_for_npmi: 20

# --- STM (prevalence-only) defaults ---
# model_class: stm in the experiment frontmatter triggers the STM path.
# covariate_formula, categorical_cols, continuous_cols are REQUIRED in
# frontmatter when model_class: stm; no sensible default exists.
# STM uses random_seed (not 'seed'); null = nondeterministic, set in
# experiment frontmatter for reproducibility.
random_seed: null
sigma_init: 1.0
sigma_ridge: 1.0e-6
lbfgs_max_iter: 50
lbfgs_tol: 1.0e-4
